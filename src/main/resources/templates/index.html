<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Интернет-магазин</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .cards { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 24px; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 20px; width: 180px; text-decoration: none; color: #333; }
        .card:hover { background: #f5f5f5; }
        .card h3 { margin: 0 0 8px; color: #0066cc; }
        .card p  { margin: 0; font-size: 13px; color: #666; }
    </style>
</head>
<body>
    <h1>Интернет-магазин</h1>
    <p>Система управления интернет-магазином</p>
    <div class="cards">
        <a th:href="@{/products}" class="card">
            <h3>Товары</h3>
            <p>Управление каталогом</p>
        </a>
        <a th:href="@{/users}" class="card">
            <h3>Пользователи</h3>
            <p>Список клиентов</p>
        </a>
        <a th:href="@{/orders}" class="card">
            <h3>Заказы</h3>
            <p>Все заказы</p>
        </a>
        <a th:href="@{/h2-console}" class="card">
            <h3>База данных</h3>
            <p>H2 консоль</p>
        </a>
    </div>
</body>
</html>
