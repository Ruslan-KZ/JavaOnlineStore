<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Вход</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 100px auto; padding: 0 20px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .error { color: red; margin-bottom: 16px; }
    </style>
</head>
<body>
    <h1>Вход в систему</h1>
    <div id="error" class="error" style="display:none">Неверный email или пароль</div>
    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="example@mail.ru"/>
    </div>
    <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="password" placeholder="Введите пароль"/>
    </div>
    <button class="btn" onclick="login()">Войти</button>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password }),
                credentials: 'include' // ← чтобы куки сохранились
            });

            if (response.ok) {
                window.location.href = '/'; // редирект на главную
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }
    </script>
</body>
</html>
