<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Пользователи</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f5f5f5; }
        .nav a { margin-right: 16px; color: #0066cc; text-decoration: none; }
        .status-active  { color: green; font-weight: bold; }
        .status-blocked { color: red;   font-weight: bold; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .btn-primary { background: #0066cc; color: white; text-decoration: none; }
        .btn-danger  { background: #cc0000; color: white; }
    </style>
</head>
<body>
    <nav class="nav">
        <a th:href="@{/}">Главная</a>
        <a th:href="@{/products}">Товары</a>
        <a th:href="@{/users}">Пользователи</a>
        <a th:href="@{/orders}">Заказы</a>
    </nav>
    <h1>Пользователи</h1>
    <a th:href="@{/users/new}" class="btn btn-primary">+ Добавить пользователя</a>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>ФИО</th>
                <th>Телефон</th>
                <th>Email</th>
                <th>Дата регистрации</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="u : ${users}">
                <td th:text="${u.id}"/>
                <td th:text="${u.fullName}"/>
                <td th:text="${u.phone}"/>
                <td th:text="${u.email}"/>
                <td th:text="${#temporals.format(u.registrationDate, 'dd.MM.yyyy HH:mm')}"/>
                <td>
                    <span th:text="${u.status}"
                          th:class="${u.status == 'active'} ? 'status-active' : 'status-blocked'"/>
                </td>
                <td>
                    <form th:action="@{/users/{id}/delete(id=${u.id})}" method="post" style="display:inline">
                        <button type="submit" class="btn btn-danger"
                                onclick="return confirm('Удалить пользователя?')">Удалить</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
