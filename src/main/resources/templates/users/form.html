<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Новый пользователь</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-primary   { background: #0066cc; color: white; }
        .btn-secondary { background: #999; color: white; text-decoration: none; margin-left: 10px; }
        .nav a { margin-right: 16px; color: #0066cc; text-decoration: none; }
    </style>
</head>
<body>
    <nav class="nav">
        <a th:href="@{/}">Главная</a>
        <a th:href="@{/users}">Пользователи</a>
    </nav>
    <h1>Новый пользователь</h1>
    <form th:action="@{/users/new}" th:object="${user}" method="post">
        <div class="form-group">
            <label>ФИО</label>
            <input type="text" th:field="*{fullName}" placeholder="Иванов Иван Иванович"/>
        </div>
        <div class="form-group">
            <label>Телефон</label>
            <input type="text" th:field="*{phone}" placeholder="+77001112233"/>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" th:field="*{email}" placeholder="example@mail.ru"/>
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" th:field="*{passwordHash}" placeholder="Введите пароль"/>
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a th:href="@{/users}" class="btn btn-secondary">Отмена</a>
    </form>
</body>
</html>
