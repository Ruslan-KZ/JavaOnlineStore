<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Форма товара</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #333; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .error { color: red; font-size: 13px; margin-top: 4px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #0066cc; color: white; }
        .btn-secondary { background: #999; color: white; text-decoration: none; margin-left: 10px; }
        .nav { margin-bottom: 20px; }
        .nav a { margin-right: 16px; color: #0066cc; }
    </style>
</head>
<body>
    <nav class="nav">
        <a th:href="@{/}">Главная</a>
        <a th:href="@{/products}">Товары</a>
    </nav>
    <h1 th:text="${productId} ? 'Редактировать товар' : 'Новый товар'">Форма товара</h1>

    <form th:action="${productId} ? @{/products/{id}/edit(id=${productId})} : @{/products/new}"
          th:object="${product}" method="post">

        <div class="form-group">
            <label>Название</label>
            <input type="text" th:field="*{name}" placeholder="Введите название"/>
            <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"/>
        </div>

        <div class="form-group">
            <label>Категория</label>
            <select th:field="*{categoryId}">
                <option value="">-- Выберите категорию --</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"/>
            </select>
        </div>

        <div class="form-group">
            <label>Бренд</label>
            <input type="text" th:field="*{brand}" placeholder="Введите бренд"/>
        </div>

        <div class="form-group">
            <label>Цена (₸)</label>
            <input type="number" th:field="*{price}" step="0.01" min="0" placeholder="0.00"/>
            <div class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"/>
        </div>

        <div class="form-group">
            <label>Описание</label>
            <textarea th:field="*{description}" rows="4" placeholder="Описание товара"></textarea>
        </div>

        <div class="form-group">
            <label>Остаток на складе</label>
            <input type="number" th:field="*{stock}" min="0" placeholder="0"/>
        </div>

        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a th:href="@{/products}" class="btn btn-secondary">Отмена</a>
    </form>
</body>
</html>
```
