<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Товары</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f5f5f5; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 13px; }
        .btn-primary { background: #0066cc; color: white; }
        .btn-warning { background: #ff9900; color: white; }
        .btn-danger { background: #cc0000; color: white; }
        .nav { margin-bottom: 20px; }
        .nav a { margin-right: 16px; color: #0066cc; }
    </style>
</head>
<body>
    <nav class="nav">
        <a th:href="@{/}">Главная</a>
        <a th:href="@{/products}">Товары</a>
    </nav>
    <h1>Список товаров</h1>
    <a th:href="@{/products/new}" class="btn btn-primary">+ Добавить товар</a>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Категория</th>
                <th>Бренд</th>
                <th>Цена</th>
                <th>Остаток</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${products}">
                <td th:text="${p.id}"/>
                <td th:text="${p.name}"/>
                <td th:text="${p.categoryName}"/>
                <td th:text="${p.brand}"/>
                <td th:text="${p.price} + ' ₸'"/>
                <td th:text="${p.stock}"/>
                <td>
                    <a th:href="@{/products/{id}/edit(id=${p.id})}" class="btn btn-warning">Изменить</a>
                    <form th:action="@{/products/{id}/delete(id=${p.id})}" method="post" style="display:inline">
                        <button type="submit" class="btn btn-danger"
                                onclick="return confirm('Удалить товар?')">Удалить</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(products)}">
                <td colspan="7" style="text-align:center;color:#999">Товаров пока нет</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
